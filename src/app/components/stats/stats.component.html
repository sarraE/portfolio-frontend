<section class="stats-section" id="stats">
  <div class="stats-container">

    <div class="section-header">
      <div class="sec-eyebrow">
        <span class="eyebrow-line"></span>
        Statistics
        <span class="eyebrow-line"></span>
      </div>
      <h2 class="sec-title">Portfolio <em>insights</em></h2>
      <p class="sec-sub">
        Real-time data about this portfolio's
        <em>performance and reach.</em>
      </p>
    </div>

    <div class="stats-grid">

      <div class="stat-card main-card">
        <div class="stat-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="stat-content">
          <div class="stat-num">{{ visitorCount }}</div>
          <div class="stat-label">Total visitors</div>
          <div class="stat-sub">Since launch</div>
        </div>
        <div class="stat-badge">Live</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div class="stat-content">
          <div class="stat-num">6<span>+</span></div>
          <div class="stat-label">Projects deployed</div>
          <div class="stat-sub">In production</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div class="stat-content">
          <div class="stat-num">18<span>+</span></div>
          <div class="stat-label">Months of experience</div>
          <div class="stat-sub">Full stack development</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="stat-content">
          <div class="stat-num">100<span>%</span></div>
          <div class="stat-label">Clean code</div>
          <div class="stat-sub">Best practices</div>
        </div>
      </div>

    </div>
  </div>
</section>
